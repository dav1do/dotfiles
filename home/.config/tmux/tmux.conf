set-option -sa terminal-overrides ",xterm*:Tc"

set -g mouse on
setw -g xterm-keys on
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -s extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

set -g default-terminal "tmux-256color"
set -g focus-events on
set -g history-limit 50000
set -g set-clipboard on
set -g renumber-windows on
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"
set -g detach-on-destroy off # don't exit from tmux when closing a session

# use ctrl-space as command key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# naviation bindings
# bind -n C-t new-window
# tried to bind C-w as kill-window but ctrl-backspace sends it and instead of deleting word, nukes window
# bind -n C-S-x kill-pane
# bind-key -n C-S-d detach

# Shift arrow to switch windows
bind -n C-S-Left previous-window
bind -n C-S-Right next-window
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# better resizing
bind-key -r C-Left resize-pane -L 2
bind-key -r C-Right resize-pane -R 2
bind-key -r C-Up resize-pane -U 2
bind-key -r C-Down resize-pane -D 2

# sesh session picker (fuzzy switch/create)
bind-key "t" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""
bind -N "last-session (via sesh)" L run-shell "sesh last"

# Pane pickers
bind-key "P" display-popup -E -w 90% -h 85% "claude-control"
bind-key "p" display-popup -E -w 80% -h 70% "tmux-pane-picker"

# ── Git ───────────────────────────────────────────────────────────────────
bind-key g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
bind-key b display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
  "git log --decorate --stat -p | less -R"

# ── GitHub ────────────────────────────────────────────────────────────────
bind-key h display-popup -E -w 40% -h 60% -d "#{pane_current_path}" \
  "{ gh pr list; echo; echo '----'; echo; gh issue list; } 2>&1 | less -R"

# ── Files ───────────────────────────────────────────────────────────
bind-key e display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lf"

# ── Claude ────────────────────────────────────────────────────────────────
# C: open as 35% right side pane / focus if elsewhere / kill if active.
# Resume after kill with `claude -c` in the new pane.
bind-key C run-shell 'bash ~/.config/tmux/scripts/claude-toggle.sh'

# vim style
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse
bind -n C-f copy-mode \; command-prompt -p "(search up):" "send-keys -X search-backward '%%'"
bind -n PPage copy-mode -u
bind v copy-mode

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 0

# ──────────────────────────────────────────────
# Last-pane tracking (jump to previous pane across windows/sessions)
# ──────────────────────────────────────────────
set-hook -g after-select-pane "run-shell 'bash ~/.config/tmux/scripts/last-pane.sh track'"
set-hook -g after-select-window "run-shell 'bash ~/.config/tmux/scripts/last-pane.sh track'"
set-hook -g client-session-changed "run-shell 'bash ~/.config/tmux/scripts/last-pane.sh track'"

bind Space run-shell "bash ~/.config/tmux/scripts/last-pane.sh jump"

# theme (must set @catppuchcin_ vars before run)
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_text " #{b:pane_current_path}#{?#{==:#{pane_current_command},zsh},, › #{pane_current_command}}"
set -g @catppuccin_window_current_text " #{b:pane_current_path}#{?#{==:#{pane_current_command},zsh},, › #{pane_current_command}}"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# dim inactive panes, highlight active border
set -gF window-style "bg=#{@thm_mantle}"
set -gF window-active-style "bg=#{@thm_bg}"

set -gF status-style "bg=#{@thm_mantle},fg=#{@thm_fg}"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left "" # session name by default
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_host}#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
# set -ag status-right "#(claude-control summary)"
set -ag status-right "#{E:@catppuccin_status_session}#{E:@catppuccin_status_date_time}"

# tmux-fzf
set-environment -g TMUX_FZF_PANE_FORMAT "[#{window_name}] #{pane_current_command}  [#{pane_width}x#{pane_height}] [history #{history_size}/#{history_limit}, #{history_bytes} bytes] #{?pane_active,[active],[inactive]}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'sainnhe/tmux-fzf'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# vim-tmux-navigator handles C-h/j/k/l forwarding for nvim via its default
# regex. Helix is intentionally excluded — it has no plugin to fall through
# from "no editor split" to tmux pane, so C-h/j/k/l are pane nav from helix.
# Use <C-w>h/j/k/l inside helix for split navigation.
