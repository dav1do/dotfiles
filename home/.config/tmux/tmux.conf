set-option -sa terminal-overrides ",xterm*:Tc"

set -g mouse on
setw -g xterm-keys on
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -s extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

set -g default-terminal "tmux-256color"
set -g focus-events on
set -g history-limit 50000
set -g set-clipboard on
set -g renumber-windows on
bind-key -N "kill pane (no prompt)" x kill-pane
bind-key -N "reload tmux config" r source-file ~/.config/tmux/tmux.conf \; display "reloaded"
set -g detach-on-destroy off # don't exit from tmux when closing a session

# use ctrl-space as command key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# naviation bindings
# bind -n C-t new-window
# tried to bind C-w as kill-window but ctrl-backspace sends it and instead of deleting word, nukes window
# bind -n C-S-x kill-pane
# bind-key -n C-S-d detach

# Shift arrow to switch windows
bind -n C-S-Left previous-window
bind -n C-S-Right next-window
bind -N "split pane below (keep cwd)" '"' split-window -v -c "#{pane_current_path}"
bind -N "split pane right (keep cwd)" % split-window -h -c "#{pane_current_path}"

# better resizing
bind-key -r -N "resize pane left" C-Left resize-pane -L 2
bind-key -r -N "resize pane right" C-Right resize-pane -R 2
bind-key -r -N "resize pane up" C-Up resize-pane -U 2
bind-key -r -N "resize pane down" C-Down resize-pane -D 2

# break a pane out to its own window / pull another pane in (choose interactively)
bind-key -N "break pane into its own window" ! break-pane
bind-key -N "join another pane into this window" @ choose-tree -Zw "join-pane -s '%%'"

# y: toggle synchronize-panes (broadcast typing to all panes in this window)
bind-key -N "toggle sync panes" y set-window-option synchronize-panes \; \
  display-message "sync-panes #{?synchronize-panes,ON,OFF}"
# k: clear screen + scrollback history for this pane
bind-key -N "clear history" k send-keys C-l \; clear-history \; \
  display-message "history cleared"
# X: collapse window to just this pane (kill all the others)
bind-key -N "kill other panes" X kill-pane -a

# toggle the whole window between side-by-side and stacked (2-pane orientation swap;
# 3+ panes get flattened into one row/column). state kept in @layout_hv.
bind-key -N "swap layout: horizontal <-> vertical" L \
  if-shell -F '#{==:#{@layout_hv},v}' \
    'select-layout even-horizontal ; set -w @layout_hv h' \
    'select-layout even-vertical ; set -w @layout_hv v'

# cycle tmux's preset layouts (even-h / even-v / main-h / main-v / tiled).
# repurposes the default switch-client prev/next, which go unused here.
bind-key -N "previous layout preset" ( previous-layout
bind-key -N "next layout preset" ) next-layout

# sesh session picker (fuzzy switch/create)
bind-key -N "sesh: session picker" "t" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Pane pickers
bind-key -N "claude-control popup" "P" display-popup -E -w 90% -h 85% "claude-control"
bind-key -N "pane picker (fuzzy)" "p" display-popup -E -w 80% -h 70% "tmux-pane-picker"
# Send current pane into another session (fzf-pick target; you stay put).
# Wrapped in run-shell because display-popup does NOT expand #{...} in its
# shell-command (only in flag args like -d). run-shell expands #{pane_id} in
# the active-pane context, so the popup gets the real pane id — not literal
# "#{pane_id}", which was making the script die instantly (flash).
bind-key -N "send pane → session" "S" \
  run-shell 'tmux display-popup -E -w 50% -h 40% "tmux-send-pane #{pane_id}"'

# ── Git ───────────────────────────────────────────────────────────────────
# g: lazygit in an ephemeral popup (quick glance; keeps per-repo cwd)
bind-key -N "lazygit (popup)" g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
# G: lazygit in a real window — zoom (prefix z) / switch away / come back; stays alive
bind-key -N "lazygit (window)" G new-window -c "#{pane_current_path}" -n lazygit lazygit
# b: toggle a persistent floating scratch shell (survives close/reopen)
bind-key -N "scratch shell (popup)" b \
  display-popup -E -w 80% -h 80% -d "#{pane_current_path}" \
  "tmux attach -t scratch || tmux new -s scratch"

# ── GitHub ────────────────────────────────────────────────────────────────
# h: interactive PR/issue dashboard  (requires: gh extension install dlvhdr/gh-dash)
bind-key -N "gh dash (popup)" h display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "gh dash"
bind-key -N "gh dash (window)" H new-window -c "#{pane_current_path}" -n gh-dash "gh dash"
# o: open current repo/branch on GitHub in the browser
bind-key -N "open repo on GitHub" o display-popup -E -w 40% -h 20% -d "#{pane_current_path}" "gh browse"

# ── Files ───────────────────────────────────────────────────────────
bind-key -N "file manager (lf)" e display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lf"

# ── Claude ────────────────────────────────────────────────────────────────
# C: open as 35% right side pane / focus if elsewhere / kill if active.
# Resume after kill with `claude -c` in the new pane.
# now that claude agents exists, this isn't as useful
bind-key -N "claude toggle pane" C run-shell 'bash ~/.config/tmux/scripts/claude-toggle.sh'

# vim style
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse
bind -n C-f copy-mode \; command-prompt -p "(search up):" "send-keys -X search-backward '%%'"
bind -n PPage copy-mode -u
bind -N "copy mode" v copy-mode

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 0

# theme (must set @catppuchcin_ vars before run)
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_text " #{b:pane_current_path}#{?#{==:#{pane_current_command},zsh},, › #{pane_current_command}}"
set -g @catppuccin_window_current_text " #{b:pane_current_path}#{?#{==:#{pane_current_command},zsh},, › #{pane_current_command}}"

# Right-side directory module: show the full ~-abbreviated path of the active
# pane (not just the basename). For a Claude pane this stays at its launch dir,
# so it surfaces the full worktree path while the Claude statusline keeps the
# basename.
set -g @catppuccin_directory_text " #{s|^/Users/david|~|:pane_current_path}"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# dim inactive panes, highlight active border
set -gF window-style "bg=#{@thm_mantle}"
set -gF window-active-style "bg=#{@thm_bg}"

set -gF status-style "bg=#{@thm_mantle},fg=#{@thm_fg}"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left "" # session name by default
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_host}#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
# set -ag status-right "#(claude-control summary)"
set -ag status-right "#{E:@catppuccin_status_session}#{E:@catppuccin_status_date_time}"

# tmux-fzf
set-environment -g TMUX_FZF_PANE_FORMAT "[#{window_name}] #{pane_current_command}  [#{pane_width}x#{pane_height}] [history #{history_size}/#{history_limit}, #{history_bytes} bytes] #{?pane_active,[active],[inactive]}"


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'sainnhe/tmux-fzf'
# tmux-thumbs: hint-jump copy (label paths/SHAs/URLs, type to copy).
set -g @plugin 'fcsonline/tmux-thumbs'

# Copy the picked hint to the macOS clipboard (and keep the tmux buffer).
set -g @thumbs-command 'tmux set-buffer -- {} && printf %s {} | pbcopy && tmux display-message "Copied {}"'
# Uppercase hint: clipboard + paste into the pane.
set -g @thumbs-upcase-command 'printf %s {} | pbcopy && tmux paste-buffer'
# Draw a contrasting box around each hint.
set -g @thumbs-contrast 1

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# vim-tmux-navigator handles C-h/j/k/l forwarding for nvim via its default
# regex. Helix is intentionally excluded — it has no plugin to fall through
# from "no editor split" to tmux pane, so C-h/j/k/l are pane nav from helix.
# Use <C-w>h/j/k/l inside helix for split navigation.
